<VirtualHost *:80>
    ServerName localhost
    ServerAlias *
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public/>
       Options FollowSymLinks
       AllowOverride All
       Require all granted
    </Directory>

    CustomLog "${APACHE_LOG_DIR}/lectormd_access.log" combined
    ErrorLog "${APACHE_LOG_DIR}/lectormd_error.log"
</VirtualHost>
