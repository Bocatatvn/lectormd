services:

  lectorimd-web:
    build: ./docker/php/
    env_file: .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - ./:/var/www/html
      - ./docker/php/apache.conf:/etc/apache2/sites-enabled/lectormd.conf
      - ./docker/php/conf/php.ini:/usr/local/etc/php/conf.d/custom.ini
    ports:
      - "${WEB_PORT}:80"
    networks:
      - red-lectorimd
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - lectorimd-sql

  lectorimd-sql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command: --max-allowed-packet=512M --wait_timeout=68800 --net_read_timeout=6000
    volumes:
      - lectorimd-db-data:/var/lib/mysql
    networks:
      - red-lectorimd
    ports:
      - "${DB_PORT}:3306"

networks:
  red-lectorimd:
    driver: bridge

volumes:
  lectorimd-db-data:
